<li class="skill-item">
  <div class="skill-item__row">
    <span class="skill-item__name">{{name}}</span>
    <div class="skill-item__bar" role="progressbar" aria-valuenow="{{level}}" aria-valuemin="0" aria-valuemax="100" aria-label="{{name}} competency">
      <span class="skill-item__fill" style="--skill-level: {{level}}"></span>
    </div>
  </div>
</li>
