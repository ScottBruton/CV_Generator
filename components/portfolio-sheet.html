<article class="page page--portfolio" id="portfolio" aria-label="Portfolio">
  <header class="portfolio-header">
    <a href="#cv" class="portfolio-header__back">↑ CV</a>
    <div class="portfolio-header__title-wrap">
      <p class="portfolio-header__eyebrow">Selected Engineering Work</p>
      <h1 class="portfolio-header__title">
        <span class="portfolio-header__title-word portfolio-header__title-word--dark">Product</span>
        <span class="portfolio-header__title-word portfolio-header__title-word--blue">Portfolio</span>
      </h1>
      <div class="portfolio-header__rail" aria-hidden="true">
        <span class="portfolio-header__rail-node portfolio-header__rail-node--blue"></span>
        <span class="portfolio-header__rail-node portfolio-header__rail-node--purple"></span>
      </div>
      <p class="portfolio-header__subtitle">
        <span>Medical Devices</span>
        <span class="portfolio-header__sep portfolio-header__sep--blue" aria-hidden="true">•</span>
        <span>Mechatronics</span>
        <span class="portfolio-header__sep portfolio-header__sep--purple" aria-hidden="true">•</span>
        <span>Product Development</span>
      </p>
    </div>
  </header>
  <div class="portfolio-grid">
    {{items}}
  </div>
</article>
