<header class="app-dashboard" aria-label="CV Generator dashboard">
  <div class="app-dashboard__brand">
    <span class="app-dashboard__title">CV Generator</span>
    <span class="app-dashboard__active" id="app-active-label">{{activeLabel}}</span>
  </div>
  <nav class="app-dashboard__nav" aria-label="Document navigation">
    <div class="app-dropdown" data-doc="cover">
      <button type="button" class="app-dropdown__trigger" aria-expanded="false" aria-haspopup="true">
        <span class="app-dropdown__trigger-text">
          <span class="app-dropdown__type">Cover Letter</span>
          <span class="app-dropdown__selection" data-dropdown-selection="cover">Breville Cover Letter</span>
        </span>
        <span class="app-dropdown__chevron" aria-hidden="true">▾</span>
      </button>
      <ul class="app-dropdown__menu" role="menu">
        {{coverOptions}}
      </ul>
    </div>
    <div class="app-dropdown" data-doc="cv">
      <button type="button" class="app-dropdown__trigger" aria-expanded="false" aria-haspopup="true">
        <span class="app-dropdown__trigger-text">
          <span class="app-dropdown__type">CV</span>
          <span class="app-dropdown__selection" data-dropdown-selection="cv">Breville CV</span>
        </span>
        <span class="app-dropdown__chevron" aria-hidden="true">▾</span>
      </button>
      <ul class="app-dropdown__menu" role="menu">
        {{cvOptions}}
      </ul>
    </div>
    <div class="app-dropdown" data-doc="portfolio">
      <button type="button" class="app-dropdown__trigger" aria-expanded="false" aria-haspopup="true">
        <span class="app-dropdown__trigger-text">
          <span class="app-dropdown__type">Portfolio</span>
          <span class="app-dropdown__selection" data-dropdown-selection="portfolio">Breville Portfolio</span>
        </span>
        <span class="app-dropdown__chevron" aria-hidden="true">▾</span>
      </button>
      <ul class="app-dropdown__menu" role="menu">
        {{portfolioOptions}}
      </ul>
    </div>
  </nav>
  <div class="app-dashboard__actions">
    <button type="button" class="app-btn app-btn--secondary" id="app-preview-btn">Preview</button>
    <button type="button" class="app-btn app-btn--primary" id="app-export-btn" title="Uses high-quality headless Chrome/Edge export when dev is running. Fallback: Save as PDF at 100% scale with Background graphics on.">Export PDF</button>
  </div>
</header>
