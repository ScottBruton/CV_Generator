<div class="skills-column">
  <div class="skills-scale" aria-hidden="true">
    <span class="skills-scale__name-spacer"></span>
    <div class="skills-scale__bar-col">
      <div class="skills-scale__labels">
        <span class="skills-scale__label">Novice</span>
        <span class="skills-scale__label">Competent</span>
        <span class="skills-scale__label">Advanced</span>
        <span class="skills-scale__label">Expert</span>
      </div>
      <div class="skills-scale__divider-guide"></div>
    </div>
    <span class="skills-scale__notes-head" title="Notes / Justification">Notes / Justification</span>
  </div>
  <div class="skills-column__groups">
    {{groups}}
  </div>
</div>
