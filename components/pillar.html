<div class="pillar pillar--{{variant}}">
  <div class="pillar__header">
    <div class="pillar__hex">
      {{hexShape}}
      {{hexIcon}}
    </div>
    <h3 class="pillar__title">{{title}}</h3>
    <p class="pillar__subtitle">{{subtitle}}</p>
  </div>

  <hr class="pillar__divider">

  <ul class="pillar__list">
    {{bullets}}
  </ul>

  <div class="pillar__kpi">
    <span class="pillar__kpi-category">{{kpiCategory}}</span>
    <span class="pillar__kpi-label">{{kpiLabel}}</span>
    <div class="pillar__kpi-grid">
      {{kpiStats}}
    </div>
  </div>
</div>
