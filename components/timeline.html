  <section class="journey" aria-label="Career journey">
    <h2 class="timeline__heading">
      <span class="timeline__heading-chevrons timeline__heading-chevrons--left" aria-hidden="true">
        <span>›</span><span>›</span><span>›</span><span>›</span>
      </span>
      <span class="timeline__heading-text">Career Path</span>
      <span class="timeline__heading-chevrons timeline__heading-chevrons--right" aria-hidden="true">
        <span>›</span><span>›</span><span>›</span><span>›</span>
      </span>
    </h2>
    <div class="timeline" style="--timeline-steps: {{stepCount}}" aria-label="Career timeline">
      <div class="timeline__grid">
        <div class="timeline__start">
          <div class="timeline__step-logo" aria-hidden="true"></div>
          <div class="timeline__step-rail">
            <span class="timeline__dot"></span>
          </div>
          <div class="timeline__step-details" aria-hidden="true"></div>
        </div>
        {{stepsHtml}}
      </div>
    </div>
  </section>
