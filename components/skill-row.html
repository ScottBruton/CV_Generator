<li class="skill-row">
  <span class="skill-row__name">{{name}}</span>
  <div class="skill-row__bar" role="progressbar" aria-valuenow="{{level}}" aria-valuemin="0" aria-valuemax="100" aria-label="{{name}} competency">
    <span class="skill-row__fill" style="--skill-level: {{level}}"></span>
    <span class="skill-row__dividers" aria-hidden="true">
      <span class="skill-row__divider"></span>
      <span class="skill-row__divider"></span>
      <span class="skill-row__divider"></span>
    </span>
  </div>
  <span class="skill-row__years">{{note}}</span>
</li>
