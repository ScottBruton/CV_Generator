<li class="{{className}}">
  <div class="timeline__marker">
    <span class="timeline__dot"></span>
  </div>
  <div class="timeline__segment">
    <span class="timeline__divider" aria-hidden="true"></span>
    <div class="timeline__details">
      <span class="timeline__label">{{label}}</span>
      <span class="timeline__dates">
        {{#if isPresent}}<span class="timeline__arrow" aria-hidden="true">&#9654;</span>{{/if}}
        {{dateRange}}
      </span>
    </div>
  </div>
</li>
